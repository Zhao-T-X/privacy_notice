name: Dynamic Multi-Site Monitor

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
  
permissions:
  contents: write

jobs:

  # 任务 2：循环抓取并处理数据
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录以支持可能的 rebase
          # 强制同步远程分支状态，丢弃本地残留的“幽灵”提交
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node Dependencies
        run: |
          # 安装必要的依赖
          npm install
          
      - name: Process HTML and Cleanup
        run: | 
          # 执行对应的解析脚本
          npm start
         

      - name: Commit and Push (Manual Rebase)
        run: |
          # 1. 配置 Git 用户信息（使用 GitHub Actions 官方机器人账号）
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. 显式添加生成的 JSON 文件
          git add .

          # 3. 检查是否有文件变动
          if ! git diff --cached --quiet; then
            git commit -m "Update ${{ matrix.site.name }} policy data"
            
            # 4. 关键步骤：拉取远程更新并执行 rebase
            # 这会自动处理“分支分叉”问题，将本地提交接在远程最新提交之后
            git pull --rebase origin main
            
            # 5. 推送回远程
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
