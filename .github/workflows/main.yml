name: Dynamic Multi-Site Monitor
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4 # 升级到 v4
      - id: set-matrix
        run: |
          # 确保 sites.json 存在，否则报错提醒
          if [ ! -f sites.json ]; then echo "sites.json not found"; exit 1; fi
          echo "matrix=$(cat sites.json | jq -c .)" >> $GITHUB_OUTPUT

  fetch-data:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # 保持 1，这是防止 Git 并发冲突最有效的手段
      matrix:
        site: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js # 增加 Node 环境确保 jsdom 安装稳定
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data for ${{ matrix.site.name }}
        uses: githubocto/flat@v3
        with:
          http_url: ${{ matrix.site.url }}
          downloaded_filename: ${{ matrix.site.name }}.html
          axios_config: config.json
          # 删掉 omit_commit，虽然它会报错，但我们后面会手动清理现场
          omit_commit: true
          
      - name: Process and Cleanup
        run: |
          npm install jsdom
          node ${{ matrix.site.process_name }}.js ${{ matrix.site.name }}.html
          # 关键：运行完立刻删除所有中间产物，让 Git 状态回归“纯净”
          rm -rf node_modules package.json package-lock.json ${{ matrix.site.name }}.html

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ${{ matrix.site.name }} policy data"
          file_pattern: 'data/*'
          push_options: '--force' # 强制推送解决分叉
          branch: main
          skip_dirty_check: false # 只有当 txt 真的变了才提交
