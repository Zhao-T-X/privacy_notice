name: Dynamic Multi-Site Monitor

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 任务 1：解析 sites.json 并生成矩阵
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ ! -f sites.json ]; then echo "sites.json not found"; exit 1; fi
          # 将 JSON 压缩为一行以供 GitHub Actions 输出
          echo "matrix=$(cat sites.json | jq -c .)" >> $GITHUB_OUTPUT

  # 任务 2：循环抓取并处理数据
  fetch-data:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # 极其重要：确保多个站点按顺序提交，防止 Git 冲突
      matrix:
        site: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取所有历史记录以支持可能的 rebase
          # 强制同步远程分支状态，丢弃本地残留的“幽灵”提交
          clean: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data (Flat)
        uses: githubocto/flat@v3
        with:
          http_url: ${{ matrix.site.url }}
          downloaded_filename: ${{ matrix.site.name }}.html
          omit_commit: true # 禁用 Flat 自动提交，由我们手动控制

      - name: Process HTML and Cleanup
        run: |
          # 安装必要的依赖
          npm install jsdom
          # 执行对应的解析脚本
          node ${{ matrix.site.process_name }}.js ${{ matrix.site.name }}.html
          # 物理删除 HTML 文件，确保它不会被 Git 误抓
          rm -f ${{ matrix.site.name }}.html

      - name: Commit and Push (Manual Rebase)
        run: |
          # 1. 配置 Git 用户信息（使用 GitHub Actions 官方机器人账号）
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. 显式添加生成的 JSON 文件
          git add .

          # 3. 检查是否有文件变动
          if ! git diff --cached --quiet; then
            git commit -m "Update ${{ matrix.site.name }} policy data"
            
            # 4. 关键步骤：拉取远程更新并执行 rebase
            # 这会自动处理“分支分叉”问题，将本地提交接在远程最新提交之后
            git pull --rebase origin main
            
            # 5. 推送回远程
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
