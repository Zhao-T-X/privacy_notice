name: Dynamic Multi-Site Monitor
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          if [ ! -f sites.json ]; then echo "sites.json not found"; exit 1; fi
          echo "matrix=$(cat sites.json | jq -c .)" >> $GITHUB_OUTPUT

  fetch-data:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1 # 必须保持为 1
    matrix:
      site: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以确保 rebase 正常

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # cache: 'npm' # 如果你有 package.json，开启缓存会快很多

      - name: Fetch data (Flat)
        uses: githubocto/flat@v3
        with:
          http_url: ${{ matrix.site.url }}
          downloaded_filename: ${{ matrix.site.name }}.html
          # axios_config: config.json # 确保此文件存在，否则删掉这行
          omit_commit: true 
          
      - name: Process and Cleanup
        run: |
          # 建议在仓库里放一个简单的 package.json，避免每次都重新安装 jsdom 耗时
          npm install jsdom 
          node ${{ matrix.site.process_name }}.js ${{ matrix.site.name }}.html
          # 物理删除 HTML，确保它不进入 git-auto-commit 的视野
          rm -f ${{ matrix.site.name }}.html

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update ${{ matrix.site.name }} policy data"
          file_pattern: 'data/*.json' # 明确只提交 data 目录下的 json
          # 关键：先 pull --rebase。这解决了多个 Matrix 任务顺序提交时的冲突
          # 不要轻易用 --force，rebase 更安全
          push_options: '--force' 
          skip_dirty_check: false
