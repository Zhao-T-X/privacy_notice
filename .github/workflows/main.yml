name: Dynamic Multi-Site Monitor
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 步骤 1: 读取 JSON 文件并转换为 Matrix 变量
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v3
      - id: set-matrix
        # 这行命令读取 sites.json 并压缩成一行字符串输出给下一步
        run: |
          echo "matrix=$(cat sites.json | jq -c .)" >> $GITHUB_OUTPUT

  # 步骤 2: 根据上一步的输出并行运行 Flat Data
  fetch-data:
    needs: set-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 这里动态读取上一步生成的列表
        site: ${{ fromJson(needs.set-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch data for ${{ matrix.site.name }}
        uses: githubocto/flat@v3
        with:
          http_url: ${{ matrix.site.url }}
          downloaded_filename: ${{ matrix.site.name }}.html
          axios_config: config.json
